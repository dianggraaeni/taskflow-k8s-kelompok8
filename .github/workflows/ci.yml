name: CI/CD Pipeline — Build & Deploy to Kubernetes

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/taskflow-api

jobs:
  # ──────────────────────────────────────────
  # Build & Push Docker Image ke GHCR
  # ──────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Login ke GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build dan push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  # ──────────────────────────────────────────
  # Deploy ke Kubernetes
  # ──────────────────────────────────────────
  deploy:
    name: Deploy ke Kubernetes
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Konfigurasi kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_BASE64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Update image di Deployment
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}"
          echo "→ Deploy image: $IMAGE"

          kubectl set image deployment/taskflow-api \
            taskflow-api=$IMAGE \
            -n taskflow-prod

      - name: Tunggu rollout selesai
        run: |
          kubectl rollout status deployment/taskflow-api \
            -n taskflow-prod \
            --timeout=120s

      - name: Verifikasi deployment
        run: |
          echo "→ Status Pod setelah deploy:"
          kubectl get pods -n taskflow-prod
          echo ""
          echo "→ Image yang berjalan:"
          kubectl get deployment taskflow-api -n taskflow-prod \
            -o jsonpath='{.spec.template.spec.containers[0].image}'
          echo ""
          echo "✅ Deploy berhasil!"
