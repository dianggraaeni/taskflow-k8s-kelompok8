apiVersion: v1
kind: Service
metadata:
  name: taskflow-api
  namespace: taskflow-prod
  labels:
    app: taskflow-api
    managed-by: kelompok8
spec:
  type: NodePort
  selector:
    app: taskflow-api       # Arahkan traffic ke Pod berlabel ini
  ports:
    - port: 80              # Port Service (internal cluster)
      targetPort: 8080      # Port di dalam container
      nodePort: 30080       # Port yang diakses dari luar cluster
